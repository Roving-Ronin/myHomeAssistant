#########################################################################
#
# Utility - Gas Sensors
#
# Used to monitor mains feed gas, with a reed sensor connected to the gas
# meter, that has a rotating dial with a magnet inside that can be monitored.
#
substitutions:
  gas_sensor_update_interval: 15s
  
########################## End of Substitutions #########################
#
# Restore input values from the valued stored by their respective globals
#
esphome:
  on_boot:
    priority: -10  # Ensure this runs before other components rely on the numbers' values
    then:
      - lambda: |-
          id(input_gas_pressure_factor).publish_state(id(gas_pressure_factor));
          id(input_gas_heating_value).publish_state(id(gas_heating_value));
          id(input_gas_daily_service_charge).publish_state(id(gas_daily_service_charge));
          id(input_gas_rates_per_mj).publish_state(id(gas_rates_per_mj));
          id(input_gas_tier1_threshold).publish_state(id(gas_tier1_threshold_mj));
          id(input_gas_tier2_threshold).publish_state(id(gas_tier2_threshold_mj));
          id(input_gas_tier3_threshold).publish_state(id(gas_tier3_threshold_mj));
          id(input_gas_tier4_threshold).publish_state(id(gas_tier4_threshold_mj));
          id(input_gas_tier1_rate_mj).publish_state(id(gas_tier1_rate_mj));
          id(input_gas_tier2_rate_mj).publish_state(id(gas_tier2_rate_mj));
          id(input_gas_tier3_rate_mj).publish_state(id(gas_tier3_rate_mj));
          id(input_gas_tier4_rate_mj).publish_state(id(gas_tier4_rate_mj));
          id(input_gas_tier5_rate_mj).publish_state(id(gas_tier5_rate_mj));
          id(input_gas_last_bill_reading).publish_state(id(gas_last_bill_reading_m3));
          id(input_gas_current_meter_reading).publish_state(id(gas_current_meter_reading_m3));
          
#########################################################################
#
# Web_server v3 Sort Groups - These substitutes are applied to overwrite the default ones supplied by the
# sensor specific template file, in this case the /sensors/hc-sr04-ultrasonic.yaml file.
#
web_server:
  sorting_groups:

    - id: group_gas_mj_sensors
      name: "Gas Sensors (MJ)"
      sorting_weight: -38
      
    - id: group_gas_m3_sensors
      name: "Gas Sensors (m³)"
      sorting_weight: -37
      
#######################################################################################
globals:
  - id: gas_pressure_factor
    type: float
    restore_value: true

  # initial_value: "0.9648"  # Default value stored in flash
  - id: gas_heating_value
    type: float
    restore_value: true

  # initial_value: "38.89"  # Default value stored in flash
  - id: global_gas_total_mj
    type: float
    restore_value: yes

  #  Globals for use with pulse meter, to allow storing and setting a base reading for gas meter
  - id: global_gas_total_m3
    type: float
    restore_value: yes

  # Used by the text_sensor to reformat the Last Used Duration into hours/minutes/seconds.
  - id: last_formatted_duration_gas
    type: std::string
    restore_value: no
    initial_value: '""'
  
  # Gas pricing / cost tracking - mirrors the tiered MJ pricing + daily service
  # charge from the gas retailer's bill. Update the tier thresholds/rates each
  # quarter along with Pressure Factor / Heating Value above.
  #
  - id: gas_daily_service_charge
    type: float
    restore_value: true
    initial_value: "0.825"

  - id: gas_rates_per_mj
    type: int
    restore_value: true
    initial_value: "5"        # how many of the 5 tier slots below are active

  - id: gas_tier1_threshold_mj
    type: float
    restore_value: true
    initial_value: "1890"

  - id: gas_tier2_threshold_mj
    type: float
    restore_value: true
    initial_value: "3750"

  - id: gas_tier3_threshold_mj
    type: float
    restore_value: true
    initial_value: "8250"

  - id: gas_tier4_threshold_mj
    type: float
    restore_value: true
    initial_value: "250500"

  - id: gas_tier1_rate_mj
    type: float
    restore_value: true
    initial_value: "0.03938"

  - id: gas_tier2_rate_mj
    type: float
    restore_value: true
    initial_value: "0.03278"

  - id: gas_tier3_rate_mj
    type: float
    restore_value: true
    initial_value: "0.03102"

  - id: gas_tier4_rate_mj
    type: float
    restore_value: true
    initial_value: "0.02838"

  - id: gas_tier5_rate_mj
    type: float
    restore_value: true
    initial_value: "0.02838"

  # One-off setup values - used by the "Gas - Apply Meter Readings" button to
  # seed the quarter baseline and calibrate the lifetime m³ total.
  - id: gas_last_bill_reading_m3
    type: float
    restore_value: true
    initial_value: "0"

  - id: gas_current_meter_reading_m3
    type: float
    restore_value: true
    initial_value: "0"

