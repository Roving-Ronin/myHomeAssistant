#######################################################################################
#
# Buttons - Manual quarter reset safety net, and one-off setup action for
# starting mid-quarter (seeds the quarter baseline + calibrates the lifetime
# m³ total from a last-bill-reading / current-meter-reading pair).
#
button:
  - platform: template
    name: "Gas - Reset Quarter"
    entity_category: config
    icon: "mdi:restart"
    on_press:
      then:
        - lambda: |-
            id(gas_statistics_component).reset_quarter();
            id(gas_statistics_mj_component).reset_quarter();
    web_server:
      sorting_weight: 48

  - platform: template
    name: "Gas - Apply Meter Readings"
    entity_category: config
    icon: "mdi:gas-cylinder"
    on_press:
      then:
        - lambda: |-
            float current_reading = id(input_gas_current_meter_reading).state;
            float last_bill = id(input_gas_last_bill_reading).state;
            float already_consumed_m3 = current_reading - last_bill;
            if (already_consumed_m3 < 0) {
              already_consumed_m3 = 0;
            }

            // 1) Calibrate the lifetime m³ total to the physical reading.
            //    This must run BEFORE the global is updated below, since it
            //    reads the *old* total internally to work out how far
            //    today/week/month/year need to shift to stay unaffected by
            //    the jump.
            id(gas_statistics_component).calibrate_total(current_reading);

            // 2) Actually move the lifetime total, and force "Gas - Total"
            //    to publish it immediately so future pulses accumulate from
            //    the calibrated figure.
            id(global_gas_total_m3) = current_reading;
            id(gas_total_m3).update();

            // 3) Seed the m³ quarter baseline from the real consumption
            //    since the last bill. This runs *after* step 2 so it reads
            //    the newly calibrated total.
            id(gas_statistics_component).reset_quarter(already_consumed_m3);

            // 4) Seed the MJ quarter baseline the same way, converting via
            //    the current Pressure Factor / Heating Value (valid here
            //    since it's scoped to just this quarter). The MJ lifetime
            //    total itself is never recalibrated - it keeps accumulating
            //    from per-pulse conversions using whatever factors were set
            //    at the time.
            float pressure_factor = id(input_gas_pressure_factor).state;
            float heating_value = id(input_gas_heating_value).state;
            float already_consumed_mj = already_consumed_m3 * pressure_factor * heating_value;
            id(gas_statistics_mj_component).reset_quarter(already_consumed_mj);
    web_server:
      sorting_weight: 49
      
################################################################################
#
#  Binary Sensor - Used to internally determine if the tap is ON/OFF.
#
binary_sensor:
  - platform: template
    name: "Gas - Valve State Sensor"
    id: gas_valve_state_sensor
    lambda: |-
      return id(gas_flow_rate).state > 0.01;
    on_press:
      then:
        - text_sensor.template.publish:
            id: gas_valve_state
            state: "OPEN"
    on_release:
      then:
        - text_sensor.template.publish:
            id: gas_valve_state
            state: "CLOSED"
    internal: true
    
################################################################################
#
#  Text Sensor - Used to publish if the tap is On
#
text_sensor:

  - platform: template
    name: "Gas - Valve State"
    id: gas_valve_state
    icon: "mdi:meter-gas"
    update_interval: never
    web_server:
      sorting_group_id: group_utility_meter_sensors
      sorting_weight: 10

  - platform: template
    name: "Gas - Last Use Duration"
    id: gas_last_use_duration
    icon: mdi:timer-outline
    lambda: |-
      // Check if the sensor has a valid state
      if (!id(gas_last_use_sensor).has_state()) {
        return std::string("Unknown");
      }
      int seconds = id(gas_last_use_sensor).state;
      if (seconds < 0) {
        return std::string("Unknown");
      }
      // Format the duration
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600);
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds / 60;
      seconds = seconds % 60;
      std::string new_value;
      if (days > 3650) {
        new_value = "Starting up";
      } else if (days) {
        new_value = to_string(days) + "d " + to_string(hours) + "h " + to_string(minutes) + "m " + to_string(seconds) + "s";
      } else if (hours) {
        new_value = to_string(hours) + "h " + to_string(minutes) + "m " + to_string(seconds) + "s";
      } else if (minutes) {
        new_value = to_string(minutes) + "m " + to_string(seconds) + "s";
      } else {
        new_value = to_string(seconds) + "s";
      }
      // Only return a new value if it differs from the previous one
      if (new_value != id(last_formatted_duration_gas)) {
        id(last_formatted_duration_gas) = new_value;
        return new_value;
      }
      return {};
#    update_interval: 10s
    web_server:
      sorting_group_id: group_utility_meter_sensors
      sorting_weight: 13
      
################################################################################
#
#  Sensors
#

sensor:
  ################################################################################
  #
  # GPIO Input A3 - PIN 5
  # Utility - Gas Meter
  #
  # Used to update the COUNTER helper, that is triggered by an automation watching the pulse_counter
  - platform: pulse_counter
    name: "Gas - Pulse Counter"
    id: gas_pulse_counter
    pin:
      number: ${gpio_gas_pin}
      allow_other_uses: true
      inverted: true
      mode:
        input: true
        pullup: true
    internal: false
    web_server:
      sorting_group_id: group_utility_meter_sensors
      sorting_weight: 12
  
  - platform: pulse_meter
    name: 'Gas - Flow Rate'
    id: "gas_flow_rate"
    unit_of_measurement: "L/min" # "m³/h"
    state_class: measurement
    device_class: volume_flow_rate  # Remeber to add an 'exclude' for 'sensor.*_flow_rate' to your recorder.yaml so these are not logged
    icon: "mdi:pump"
    accuracy_decimals: 3
    pin:
      number: ${gpio_gas_pin}
      allow_other_uses: true
      inverted: true
      mode:
        input: true
        pullup: true
    internal_filter_mode: PULSE
    internal_filter: 100ms
    timeout: 150s
    filters:
      - multiply: 10.0     # 1 pulse = 10L. The gas counter 'helper' in Home Assistant must still be set to 'step size' = 10.
    web_server:
      sorting_group_id: group_utility_meter_sensors
      sorting_weight: 11
    #  Uses the above pulse_meter and adds sensor and calculations for tracking m3
    total:
      name: 'Gas - Consumed Calculations'
      id: gas_consumed_calculations
      unit_of_measurement: "m³"
      icon: "mdi:counter"
      state_class: "total_increasing"
      device_class: gas
      accuracy_decimals: 3
      filters:
        - multiply: 0.01   # 100 pulses = 1,000L = 1m3
    #  Adds the calculation for providing a reading since device last booted / reset
    #  Linea below changed to seperate m3 and MJ gas totals and calculations
      on_value:
        then:
          - lambda: |-
              static float previous_gas_m3_value = 0.0;
              float current_gas_m3_value = id(gas_consumed_calculations).state;
              float gas_delta_m3 = current_gas_m3_value - previous_gas_m3_value;

              // Update total gas used in m³
              id(global_gas_total_m3) += gas_delta_m3;
              // Calculate gas used in MJ
              float pressure_factor = id(input_gas_pressure_factor).state;
              float heating_value = id(input_gas_heating_value).state;
              float gas_delta_mj = gas_delta_m3 * pressure_factor * heating_value;

              // Update total gas used in MJ
              id(global_gas_total_mj) += gas_delta_mj;
              // Save the current value for the next calculation
              previous_gas_m3_value = current_gas_m3_value;
              // Update global sensors
              id(gas_total_m3).update();
              id(gas_total_mj).update();
      internal: true
  
  ################################################################################
  #
  # Custom Component - Gas m3 (Consumption) Statistics
  # These sensors are hidden as the publish their data into the globals, that stores them
  #
  
  - platform: "gas_statistics"
    id: gas_statistics_component
    total: gas_total_m3
    quarter_reset_day: input_gas_quarter_reset_day
    quarter_start_month: input_gas_quarter_start_month

    gas_today:
      name: "Gas - Today"
      id: gas_m3_today
      web_server:
        sorting_group_id: group_gas_m3_sensors
        sorting_weight: 1

#    gas_yesterday:
#      name: "Gas - Yesterday"
#      id: gas_m3_yesterday
#      web_server:
#        sorting_group_id: group_gas_m3_sensors
#        sorting_weight: 2
    gas_week:
      name: "Gas - Week"
      id: gas_m3_week
      web_server:
        sorting_group_id: group_gas_m3_sensors
        sorting_weight: 3

    gas_month:
      name: "Gas - Month"
      id: gas_m3_month
      web_server:
        sorting_group_id: group_gas_m3_sensors
        sorting_weight: 4

    gas_quarter:
      name: "Gas - Quarter"
      id: gas_m3_quarter
      web_server:
        sorting_group_id: group_gas_m3_sensors
        sorting_weight: 5

    gas_year:
      name: "Gas - Year"
      id: gas_m3_year
      web_server:
        sorting_group_id: group_gas_m3_sensors
        sorting_weight: 6

  ################################################################################
  #  Adds the 'Reading Since Reset' that tracks the LIFETIME total of m3
  #  Hidden from HA/web_server (internal: true) - still required internally as
  #  the `total:` binding for gas_statistics_component above.

  - platform: template
    name: "Gas - Total"
    id: gas_total_m3
    unit_of_measurement: "m³"
    device_class: gas
    state_class: "total_increasing"
    icon: "mdi:counter"
    accuracy_decimals: 3
    # The number 5251.07 should be replaced with your own gas meters physical reading
    lambda: |-
          return id(global_gas_total_m3);
    # Set interval that updates are sent to HA instance
    update_interval: ${gas_sensor_update_interval}
    internal: true

  ################################################################################
  #
  # Custom Component - Gas MJ (Consumption) Statistics
  #
  
  - platform: "gas_statistics_mj"
    id: gas_statistics_mj_component
    total: gas_total_mj
    quarter_reset_day: input_gas_quarter_reset_day
    quarter_start_month: input_gas_quarter_start_month
    gas_today:
      name: "Gas - Today (MJ)"
      id: gas_used_today_mj
      web_server:
        sorting_group_id: group_gas_mj_sensors
        sorting_weight: 1

#    gas_yesterday:
#      name: "Gas - Yesterday (MJ)"
#      id: gas_used_yesterday_mj
#      web_server:
#        sorting_group_id: group_gas_mj_sensors
#        sorting_weight: 2

    gas_week:
      name: "Gas - Week (MJ)"
      id: gas_used_week_mj
      web_server:
        sorting_group_id: group_gas_mj_sensors
        sorting_weight: 3

    gas_month:
      name: "Gas - Month (MJ)"
      id: gas_used_month_mj
      web_server:
        sorting_group_id: group_gas_mj_sensors
        sorting_weight: 4

    gas_quarter:
      name: "Gas - Quarter (MJ)"
      id: gas_used_quarter_mj
      web_server:
        sorting_group_id: group_gas_mj_sensors
        sorting_weight: 5

    gas_year:
      name: "Gas - Year (MJ)"
      id: gas_used_year_mj
      web_server:
        sorting_group_id: group_gas_mj_sensors
        sorting_weight: 6
  
  ################################################################################
  #  Hidden from HA/web_server (internal: true) - still required internally as
  #  the `total:` binding for gas_statistics_mj_component above. Never
  #  recalibrated to a single reading - Pressure Factor / Heating Value change
  #  every quarter, so this stays as a running sum of per-pulse conversions.

  - platform: template
    name: "Gas - Total (MJ)"
    id: gas_total_mj
    unit_of_measurement: "MJ"
    device_class: energy
    state_class: "total_increasing"
    icon: "mdi:counter"
    accuracy_decimals: 3
    # With EACH QUARTERLY GAS BILL update the Jemena Pressure Factor and Heating Value below.
    # Formula - (Gas Used x Pressure Factor x Heating Value) = Usage MJ
    lambda: |-
       return id(global_gas_total_mj);
    update_interval: ${gas_sensor_update_interval}
    internal: true

  ################################################################################
  #
  #  Gas pricing - tiered $/MJ lookup (based on quarter-to-date MJ usage),
  #  the equivalent $/m³ rate derived from it, and today's running cost
  #  (service charge + consumption). Recalculated continuously since the
  #  active tier depends on quarter-to-date usage.
  #

  - platform: template
    name: "Gas - Price (MJ)"
    id: gas_price_mj
    unit_of_measurement: "$/MJ"
    device_class: monetary
    accuracy_decimals: 5
    icon: "mdi:currency-usd"
    update_interval: ${gas_sensor_update_interval}
    lambda: |-
      float quarter_mj = id(gas_used_quarter_mj).state;
      int active_tiers = (int) id(input_gas_rates_per_mj).state;
      if (active_tiers < 1) active_tiers = 1;
      if (active_tiers > 5) active_tiers = 5;

      float thresholds[4] = {
        id(input_gas_tier1_threshold).state,
        id(input_gas_tier2_threshold).state,
        id(input_gas_tier3_threshold).state,
        id(input_gas_tier4_threshold).state,
      };
      float rates[5] = {
        id(input_gas_tier1_rate_mj).state,
        id(input_gas_tier2_rate_mj).state,
        id(input_gas_tier3_rate_mj).state,
        id(input_gas_tier4_rate_mj).state,
        id(input_gas_tier5_rate_mj).state,
      };

      // Walk the thresholds for only as many tiers as are active; default to
      // the last active tier (the "everything above" catch-all) if none of
      // the earlier thresholds matched.
      int selected_tier = active_tiers - 1;
      for (int i = 0; i < active_tiers - 1; i++) {
        if (quarter_mj <= thresholds[i]) {
          selected_tier = i;
          break;
        }
      }
      return rates[selected_tier];
    web_server:
      sorting_group_id: group_gas_mj_sensors
      sorting_weight: 9

  - platform: template
    name: "Gas - Price (m³)"
    id: gas_price_m3
    unit_of_measurement: "$/m³"
    device_class: monetary
    accuracy_decimals: 5
    icon: "mdi:currency-usd"
    update_interval: ${gas_sensor_update_interval}
    lambda: |-
      // Derived from Price (MJ), not its own independent tier table - $/m³
      // is just $/MJ run through the same pressure factor / heating value
      // conversion used everywhere else.
      float price_mj = id(gas_price_mj).state;
      float pressure_factor = id(input_gas_pressure_factor).state;
      float heating_value = id(input_gas_heating_value).state;
      return price_mj * pressure_factor * heating_value;
    web_server:
      sorting_group_id: group_gas_m3_sensors
      sorting_weight: 9

  - platform: template
    name: "Gas - Daily Cost"
    id: gas_daily_cost
    unit_of_measurement: "$"
    device_class: monetary
    accuracy_decimals: 2
    icon: "mdi:cash"
    update_interval: ${gas_sensor_update_interval}
    lambda: |-
      float daily_charge = id(input_gas_daily_service_charge).state;
      float today_mj = id(gas_used_today_mj).state;
      float price_mj = id(gas_price_mj).state;
      return daily_charge + (today_mj * price_mj);
    web_server:
      sorting_group_id: group_gas_mj_sensors
      sorting_weight: 10

  ################################################################################
  #
  #  Uses the Usage_Tracker custom component to publish duration of last tap OPEN.
  #
  
  - platform: usage_tracker
    on_off_sensor: gas_valve_state_sensor
    # This is internal as we use a text_sensor above to reformat the output into days/hours/min/sec.
    last_use:
      name: "Gas - Last Use Sensor"
      id: gas_last_use_sensor
      accuracy_decimals: 1
      filters:
        - delta: 0.1         # Only update if change is ≥ 0.1 min
      internal: true
    # Don't want to show this sensor, but the custom_component requires that both sensors are used.
    lifetime_use:
      name: "Gas - Lifetime Use Duration"
      id: gas_lifetime_use_sensor
      unit_of_measurement: "min"
      accuracy_decimals: 1
      filters:
        - lambda: |-
            return x / 60.0;
        - delta: 0.1         # Only update if change is ≥ 0.1 min
      web_server:
        sorting_group_id: group_utility_meter_sensors
        sorting_weight: 5
      internal: true

################################################################################
