    # Binary sensor that tracks of the Light (id: downlight) is ON or OFF.
    # This is used by the usage_tracker as its source sensor.
#  - platform: template
#    name: "Light 2 - State"
#    id: light2_state
#    icon: 'mdi:state-machine'
#    lambda: |-
#      return id(light2).current_values.is_on();
#    internal: true
#    disabled_by_default: true

    # Binary sensor that tracks of the Light (id: downlight) is ON or OFF.
    # This is used by the usage_tracker as its source sensor.
#  - platform: template
#    name: "Light 3 - State"
#    id: light3_state
#    icon: 'mdi:state-machine'
#    lambda: |-
#      return id(light3).current_values.is_on();
#    internal: true
#    disabled_by_default: true


##########################################################################
#
# Relays
#

output:
  # Relays
  - platform: gpio
    pin: GPIO13
    id: relay1

  - platform: gpio
    pin: GPIO4
    id: relay2

  - platform: gpio
    pin: GPIO15
    id: relay3

  # Button LEDs (1.0 = Blue / 0.0 = Red)
  - platform: esp8266_pwm
    pin: GPIO16
    inverted: true
    id: button_led1
    
  - platform: esp8266_pwm
    pin: GPIO14
    inverted: true
    id: button_led2
    
  - platform: esp8266_pwm
    pin: GPIO1
    inverted: true
    id: button_led3


##########################################################################
#
# Lights
#

light:

  # Garage Bench Light
  - platform: binary
    name: ${button1_assignment}
    id: light1
    icon: 'mdi:lightbulb'
    output: relay1
    restore_mode: ${light1_restore_mode}
    on_turn_on:
      - light.turn_on: led1
    on_turn_off:
      - light.turn_off: led1
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 1

  # Garage Light (Ceiling)
  - platform: binary
    name: ${button2_assignment}
    id: light2
    icon: 'mdi:lightbulb'
    output: relay2
    restore_mode: ${light2_restore_mode}
    on_turn_on:
      - light.turn_on: led2
    on_turn_off:
      - light.turn_off: led2
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 2

  # Front Hallway Light
  - platform: binary
    name: ${button3_assignment}
    id: light3
    icon: 'mdi:lightbulb'
    output: relay3
    restore_mode: ${light3_restore_mode}
    on_turn_on:
      - light.turn_on: led3
    on_turn_off:
      - light.turn_off: led3
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 3

  - platform: status_led
    name: "Status LED"
    icon: 'mdi:wifi-alert'
    disabled_by_default: true
    pin:
      number: GPIO0
      inverted: true
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 7


############################

  # Button LEDs
  - platform: monochromatic
    name: "Backlight - ${backlight1_assignment}"
    icon: 'mdi:led-on'
    disabled_by_default: true
    id: led1
    output: button_led1
    default_transition_length: 500ms
    internal: true
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 4


  - platform: monochromatic
    name: "Backlight - ${backlight2_assignment}"
    icon: 'mdi:led-on'
    disabled_by_default: true
    id: led2
    output: button_led2
    default_transition_length: 500ms
    internal: true
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 5

      
  - platform: monochromatic
    name: "Backlight - ${backlight3_assignment}"
    icon: 'mdi:led-on'
    disabled_by_default: true
    id: led3
    output: button_led3
    default_transition_length: 500ms
    internal: true
    web_server:
      sorting_group_id: group_light_switches
      sorting_weight: 6


